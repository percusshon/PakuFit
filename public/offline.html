<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#2ea0c7" />
    <title>オフライン / パクフィット</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at top, #f0f8ff 0%, #f8fbff 45%, #edf5ff 100%);
        color: #1f2937;
        font-family: "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
      }
      .card {
        max-width: 22rem;
        margin: 1.5rem;
        padding: 2rem;
        border-radius: 1.25rem;
        background: rgba(255, 255, 255, 0.85);
        border: 1px solid rgba(255, 255, 255, 0.6);
        box-shadow: 0 10px 30px rgba(23, 109, 136, 0.12);
        text-align: center;
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.25rem;
        color: #176d88;
      }
      p {
        margin: 0.5rem 0 0;
        font-size: 0.9rem;
        line-height: 1.6;
        color: #475569;
      }
      button {
        margin-top: 1.5rem;
        padding: 0.6rem 1.4rem;
        border: none;
        border-radius: 9999px;
        background: #2ea0c7;
        color: #fff;
        font-size: 0.9rem;
        cursor: pointer;
      }
      button:hover {
        background: #1f8fb4;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>オフラインです</h1>
      <p>
        インターネットに接続できませんでした。記録の表示・保存にはネットワーク接続が必要です。
        接続を確認してから、もう一度お試しください。
      </p>
      <button type="button" onclick="location.reload()">再読み込み</button>
    </div>
  </body>
</html>
